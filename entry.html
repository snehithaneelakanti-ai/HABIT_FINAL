<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitGarden — Plant your habits, watch them bloom</title>
  <meta name="description" content="HabitGarden is a premium habit tracking system. Build routines that last.">
  <link rel="stylesheet" href="css/world.css">
  <link rel="stylesheet" href="css/entry.css">
  <link rel="stylesheet" href="css/star-transition.css">
</head>
<body class="world-bg">

  <!-- World background layers -->
  <div id="world-layer">
    <div id="star-field"></div>
    <div id="orb-container"></div>
    <div id="mist-layer" class="mist"></div>
    <div id="garden-strip"></div>
  </div>

  <!-- Entry Card -->
  <main class="entry-page">
    <div class="auth-card">

      <!-- Branding -->
      <h1 class="brand-title">HabitGarden</h1>
      <p class="brand-sub">Plant your habits, watch them bloom.</p>

      <!-- Tabs -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab-btn active" id="tab-login"
                role="tab" aria-selected="true" aria-controls="form-login">Sign In</button>
        <button class="auth-tab-btn" id="tab-register"
                role="tab" aria-selected="false" aria-controls="form-register">Register</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="form-login" role="tabpanel" novalidate>
        <div class="input-group">
          <input type="email" id="login-email" name="email"
                 placeholder="Email address" autocomplete="email" required>
          <span class="input-line"></span>
        </div>
        <div class="input-group">
          <input type="password" id="login-password" name="password"
                 placeholder="Password" autocomplete="current-password" required>
          <span class="input-line"></span>
          <button type="button" class="pwd-toggle" id="toggle-login-pwd" aria-label="Toggle password visibility">
            <!-- Eye open -->
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye closed -->
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="auth-error" id="login-error" role="alert"></div>
        <button type="submit" class="auth-submit" id="login-btn">Enter the Garden</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form hidden" id="form-register" role="tabpanel" novalidate>
        <div class="input-group">
          <input type="text" id="reg-name" name="name"
                 placeholder="Your name" autocomplete="name" required>
          <span class="input-line"></span>
        </div>
        <div class="input-group">
          <input type="email" id="reg-email" name="email"
                 placeholder="Email address" autocomplete="email" required>
          <span class="input-line"></span>
        </div>
        <div class="input-group">
          <input type="password" id="reg-password" name="password"
                 placeholder="Choose a password" autocomplete="new-password" required>
          <span class="input-line"></span>
          <button type="button" class="pwd-toggle" id="toggle-reg-pwd" aria-label="Toggle password visibility">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
                 aria-hidden="true">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="auth-error" id="reg-error" role="alert"></div>
        <button type="submit" class="auth-submit" id="reg-btn">Plant My Seed</button>
      </form>

      <div class="social-divider">
        <span>or</span>
      </div>

      <div class="social-actions" id="social-actions">
        <a href="OAuthServlet?provider=google" class="social-btn google" aria-label="Sign in with Google">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </a>
        <a href="OAuthServlet?provider=github" class="social-btn github" aria-label="Sign in with GitHub">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
          GitHub
        </a>
      </div>

      <!-- Decorative lily pad SVG -->
      <svg class="lily-pad" viewBox="0 0 120 120" aria-hidden="true" width="90" height="90">
        <circle cx="60" cy="60" r="50" fill="rgba(0,200,160,0.15)" stroke="rgba(0,255,208,0.2)" stroke-width="1"/>
        <path d="M60 60 L60 10" stroke="rgba(0,255,208,0.3)" stroke-width="1" fill="none"/>
        <path d="M60 60 L100 35" stroke="rgba(0,255,208,0.15)" stroke-width="1" fill="none"/>
        <path d="M60 60 L20 35" stroke="rgba(0,255,208,0.15)" stroke-width="1" fill="none"/>
      </svg>

    </div>
  </main>

  <script src="js/world.js"></script>
  <script src="js/star-transition.js"></script>
  <script src="js/entry.js"></script>
</body>
</html>
